<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#1e1e1e; color:#ccc; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* Top bar */
.topbar { background:#252526; padding:10px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; flex-wrap:wrap; gap:6px; }
.topbar h1 { font-size:16px; color:#fff; font-weight:700; }

.progress-text { font-size:14px; color:#4EC9B0; font-weight:600; }
.last-published { font-size:10px; color:#888; }
.progress-bar-wrap { background:#3c3c3c; height:6px; flex-shrink:0; }
.progress-bar-fill { height:100%; background:#4CAF50; transition:width 0.3s; }

/* Main split */
.main { display:flex; flex:1; overflow:hidden; }
.left-panel { width:480px; min-width:320px; overflow-y:auto; border-right:2px solid #333; flex-shrink:0; }
.right-panel { flex:1; overflow-y:auto; padding:0; }

/* Scrollbar */
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:#1e1e1e; }
::-webkit-scrollbar-thumb { background:#555; border-radius:4px; }

/* Phase */
.phase { margin:6px 8px; }
.phase-header { background:#2d2d2d; display:flex; align-items:center; cursor:pointer; user-select:none; padding:6px 0; }
.phase-header:hover { background:#353535; }
.phase-color-bar { width:5px; align-self:stretch; flex-shrink:0; }
.phase-toggle { font-family:Consolas; font-size:10px; color:#aaa; padding:0 6px; width:20px; text-align:center; }
.phase-title { font-size:11px; font-weight:700; color:#fff; flex:1; }
.phase-count { font-size:10px; padding-right:8px; font-weight:600; }
.phase-tasks { padding-left:4px; }
.phase-tasks.collapsed { display:none; }

/* Task row */
.task-row { background:#252526; margin:1px 6px; padding:4px 8px; display:flex; align-items:center; cursor:pointer; border-radius:2px; }
.task-row:hover { background:#2a2d2e; }
.task-row.selected { background:#2a4a6e; border-left:3px solid #4EC9B0; }
.task-row input[type=checkbox] { accent-color:#4CAF50; width:16px; height:16px; cursor:pointer; flex-shrink:0; }
.task-id { font-family:Consolas; font-size:10px; font-weight:700; width:42px; flex-shrink:0; margin:0 6px; }
.task-name { font-size:10px; flex:1; }
.task-name.done { color:#888; text-decoration:line-through; }
.task-badges { display:flex; gap:3px; flex-shrink:0; margin-left:4px; }
.badge { font-size:7px; font-weight:700; color:#fff; padding:1px 4px; border-radius:2px; }
.badge-sch { background:#0078D4; }
.badge-pcb { background:#388E3C; }

/* Right panel */
.right-placeholder { display:flex; align-items:center; justify-content:center; height:100%; color:#555; font-size:16px; }
.detail-title { font-size:14px; font-weight:700; color:#4EC9B0; padding:12px 16px 6px; }
.detail-instructions { background:#2d2d2d; margin:0 12px 8px; padding:8px 12px; border-radius:4px; }
.detail-instructions .label { font-size:9px; font-weight:700; color:#888; margin-bottom:4px; }
.detail-instructions pre { font-family:Consolas; font-size:11px; color:#ddd; white-space:pre-wrap; line-height:1.5; }

/* Notes */
.notes-section { background:#2d2d2d; margin:0 12px 8px; padding:8px 12px; border-radius:4px; border-left:3px solid #FFB300; }
.notes-section .label { font-size:9px; font-weight:700; color:#FFB300; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; }
.notes-section .saved { font-size:8px; color:#888; font-weight:400; }
.notes-section textarea { width:100%; min-height:70px; background:#1e1e1e; border:1px solid #444; color:#ddd; font-family:Consolas; font-size:11px; padding:6px 8px; border-radius:3px; resize:vertical; line-height:1.4; }
.notes-section textarea:focus { outline:none; border-color:#FFB300; }
.notes-section textarea:disabled { background:#252526; color:#888; cursor:not-allowed; }
.notes-indicator { color:#FFB300; font-size:9px; margin-left:4px; }

/* Image sections */

.img-section-header.sch { background:#0078D4; }

.img-caption { text-align:center; font-size:8px; color:#666; padding:2px 0 4px; }

.toast.error { background:#d32f2f; }

/* Setup modal */

// GitHub config
const GITHUB_OWNER = "EduardKliger";
const GITHUB_REPO = "ccb-revc-tracker";
const STATE_PATH = "state.json";
const TOKEN_KEY = "ccb_tracker_gh_token";
const LOCAL_KEY = "ccb_tracker_local_state";

let state = {};
let notes = {};
let publishedDate = null;
let isEditorMode = false;
let notesSaveTimer = null;

// Load state: always fetch published state.json from GitHub Pages
async function initState() {
  // Check if user has a token (editor mode)
  isEditorMode = !!localStorage.getItem(TOKEN_KEY);

  // 1) Fetch the published state.json (works for everyone viewing the site)
  let publishedState = {};
  let publishedNotes = {};
  try {
    const resp = await fetch(STATE_PATH + "?t=" + Date.now());
    if (resp.ok) {
      const published = await resp.json();
      if (published._publishedAt) {
        publishedDate = published._publishedAt;
        document.getElementById("lastPublished").textContent =
          "Last published: " + new Date(publishedDate).toLocaleString();
      }
      if (published._notes) { publishedNotes = published._notes; }
      delete published._publishedAt;
      delete published._notes;
      publishedState = published;
    }
  } catch(e) { /* state.json not available */ }

  if (isEditorMode) {
    // Editor: compare timestamps — if published is newer than local edits, use published
    let localState = {}; let localNotes = {}; let localUpdatedAt = null;
    try { const ls = JSON.parse(localStorage.getItem(LOCAL_KEY)) || {}; localUpdatedAt = ls._localUpdatedAt || null; delete ls._localUpdatedAt; localState = ls; } catch(e) {}
    try { localNotes = JSON.parse(localStorage.getItem(LOCAL_KEY+"_notes")) || {}; } catch(e) {}

    const publishedAt = publishedDate ? new Date(publishedDate).getTime() : 0;
    const localAt = localUpdatedAt ? new Date(localUpdatedAt).getTime() : 0;

    if (Object.keys(localState).length === 0 || publishedAt >= localAt) {
      // Published is newer (or no local data) — use published as source of truth
      state = publishedState;
      notes = publishedNotes;
      localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
      localStorage.setItem(LOCAL_KEY+"_notes", JSON.stringify(notes));
    } else {
      // Local edits are newer than last publish — keep them
      state = localState;
      notes = localNotes;
    }
  } else {
    // Viewer: always show published state, read-only
    state = publishedState;
    notes = publishedNotes;
  }

  buildUI();
  updateViewerMode();
}

function saveState() {
  const toSave = Object.assign({}, state, { _localUpdatedAt: new Date().toISOString() });
  localStorage.setItem(LOCAL_KEY, JSON.stringify(toSave));
}

function saveNotes() {
  localStorage.setItem(LOCAL_KEY+"_notes", JSON.stringify(notes));
}

function onNoteInput(taskId, ta) {
  const val = ta.value;
  if (val.trim() === "") { delete notes[taskId]; }
  else { notes[taskId] = val; }
  // Debounced save + status indicator
  const status = document.getElementById("note-status-"+taskId);
  if (status) status.textContent = "editing\u2026";
  if (notesSaveTimer) clearTimeout(notesSaveTimer);
  notesSaveTimer = setTimeout(() => {
    saveNotes();
    if (status) status.textContent = "saved locally \u2014 publish to share";
    // Update sidebar indicator
    const ind = document.getElementById("note-ind-"+taskId);
    if (ind) ind.style.display = notes[taskId] ? "" : "none";
  }, 400);
}

function updateProgress() {
  let total = 0, done = 0;
  PHASES.forEach(p => p.tasks.forEach(t => { total++; if(state[t.id]) done++; }));
  const pct = total > 0 ? Math.round(100*done/total) : 0;
  document.getElementById("progressText").textContent = done+" / "+total+" ("+pct+"%)";
  document.getElementById("progressBar").style.width = pct+"%";
  PHASES.forEach((p,i) => {
    const el = document.getElementById("phase-count-"+i);
    if(!el) return;
    const c = p.tasks.filter(t => state[t.id]).length;
    el.textContent = "  ["+c+"/"+p.tasks.length+"]";
    el.style.color = c === p.tasks.length ? "#4CAF50" : p.color;
  });
}

function togglePhase(idx) {
  const tf = document.getElementById("phase-tasks-"+idx);
  const tb = document.getElementById("phase-toggle-"+idx);
  if(tf.classList.contains("collapsed")) {
    tf.classList.remove("collapsed"); tb.textContent = "\u25BC";
  } else {
    tf.classList.add("collapsed"); tb.textContent = "\u25B6";
  }
}

function onCheck(taskId, cb) {
  state[taskId] = cb.checked;
  saveState();
  updateProgress();
  const nameEl = document.getElementById("name-"+taskId);
  if(nameEl) nameEl.classList.toggle("done", cb.checked);
}

let selectedTaskId = null;
function selectTask(taskId) {
  document.querySelectorAll(".task-row.selected").forEach(el => el.classList.remove("selected"));
  const row = document.getElementById("row-"+taskId);
  if(row) row.classList.add("selected");
  selectedTaskId = taskId;
  let task = null;
  PHASES.forEach(p => p.tasks.forEach(t => { if(t.id === taskId) task = t; }));
  if(task) showDetail(task);
}

function showDetail(task) {
  const rp = document.getElementById("rightPanel");
  let html = '<div class="detail-title">'+escHtml(task.id)+'  '+escHtml(task.name)+'</div>';
  html += '<div class="detail-instructions"><div class="label">INSTRUCTIONS</div><pre>'+escHtml(task.detail)+'</pre></div>';
  // Notes section
  const noteVal = notes[task.id] || "";
  const ro = isEditorMode ? "" : " disabled";
  const placeholder = isEditorMode ? "Add notes for this task\u2026 (auto-saved locally; click Publish to share)" : "No notes (view-only)";
  html += '<div class="notes-section">'
        + '<div class="label"><span>NOTES</span><span class="saved" id="note-status-'+task.id+'">'+(noteVal?"saved locally":"")+'</span></div>'
        + '<textarea id="note-ta-'+task.id+'" placeholder="'+placeholder+'" oninput="onNoteInput(\''+task.id+'\', this)"'+ro+'>'+escHtml(noteVal)+'</textarea>'
        + '</div>';
  task.sch.forEach(pg => {
    html += '<div class="img-section-header sch">SCHEMATIC \u2014 Sheet '+pg+'</div>';
    html += '<div class="img-container"><canvas id="sch-canvas-'+pg+'"></canvas></div>';
    if(task.sr.length) html += '<div class="img-caption">Zoomed to: '+task.sr.join(", ")+'</div>';
  });
  if(task.pcb) {
    html += '<div class="img-section-header pcb">PCB LAYOUT \u2014 Job1</div>';
    html += '<div class="img-container"><canvas id="pcb-canvas"></canvas></div>';
    if(task.pr.length) html += '<div class="img-caption">Zoomed to: '+task.pr.join(", ")+'</div>';
  }
  if(!task.sch.length && !task.pcb) {
    html += '<div class="no-images">No schematic/PCB reference for this task</div>';
  }
  rp.innerHTML = html;
  task.sch.forEach(pg => loadAndRender("sch", pg, task.sr, "sch-canvas-"+pg));
  if(task.pcb) loadAndRender("pcb", 0, task.pr, "pcb-canvas");
}

function loadAndRender(type, pageNum, refs, canvasId) {
  const img = new Image();
  img.onload = function() { renderCropped(img, type, pageNum, refs, canvasId); };
  img.onerror = function() {
    const c = document.getElementById(canvasId);
    if(c) { c.width=400; c.height=60; const ctx=c.getContext("2d"); ctx.fillStyle="#333"; ctx.fillRect(0,0,400,60); ctx.fillStyle="#f66"; ctx.font="14px Segoe UI"; ctx.fillText("Image not found",20,35); }
  };
  img.src = type==="pcb" ? IMG_BASE+"pcb_job1.png" : IMG_BASE+"sch_page_"+String(pageNum).padStart(2,"0")+".png";
}

function renderCropped(img, type, pageNum, refs, canvasId) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const margin = type==="pcb" ? PCB_MARGIN : SCH_MARGIN;
  const points = [];
  refs.forEach(rd => {
    const key = type==="pcb" ? "pcb_"+rd : "sch_"+pageNum+"_"+rd;
    if(COORDS[key]) points.push({x:COORDS[key][0], y:COORDS[key][1], name:rd});
  });
  let sx, sy, sw, sh;
  if(points.length) {
    const xs=points.map(p=>p.x), ys=points.map(p=>p.y);
    const cx=(Math.min(...xs)+Math.max(...xs))/2, cy=(Math.min(...ys)+Math.max(...ys))/2;
    const halfW=Math.max(margin,(Math.max(...xs)-Math.min(...xs))/2+margin);
    const halfH=Math.max(margin,(Math.max(...ys)-Math.min(...ys))/2+margin);
    sx=Math.max(0,(cx-halfW))*iw; sy=Math.max(0,(cy-halfH))*ih;
    sw=Math.min(iw,(cx+halfW)*iw)-sx; sh=Math.min(ih,(cy+halfH)*ih)-sy;
  } else { sx=0; sy=0; sw=iw; sh=ih; }
  const container = canvas.parentElement;
  const maxW = container.clientWidth||700;
  const scale = Math.min(1, maxW/sw);
  canvas.width = Math.round(sw*scale);
  canvas.height = Math.round(sh*scale);
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
  points.forEach(p => {
    const px=(p.x*iw-sx)*scale, py=(p.y*ih-sy)*scale, r=22;
    ctx.strokeStyle="#ff2222"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(px,py,r,0,2*Math.PI); ctx.stroke();
    ctx.lineWidth=2; ctx.beginPath();
    ctx.moveTo(px-r-6,py); ctx.lineTo(px+r+6,py);
    ctx.moveTo(px,py-r-6); ctx.lineTo(px,py+r+6); ctx.stroke();
    ctx.fillStyle="#ff2222"; ctx.font="bold 13px Consolas"; ctx.fillText(p.name,px+r+5,py-4);
  });
}

function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function expandAll() { PHASES.forEach((_,i)=>{ const f=document.getElementById("phase-tasks-"+i),t=document.getElementById("phase-toggle-"+i); if(f){f.classList.remove("collapsed");t.textContent="\u25BC";}}); }
function collapseAll() { PHASES.forEach((_,i)=>{ const f=document.getElementById("phase-tasks-"+i),t=document.getElementById("phase-toggle-"+i); if(f){f.classList.add("collapsed");t.textContent="\u25B6";}}); }

function resetAll() {
  if(confirm("Clear ALL checkmarks and notes?\nThis cannot be undone.")) {
    state = {}; notes = {}; saveState(); saveNotes(); buildUI();
  }
}

// Viewer mode: disable checkboxes, hide editor buttons
function updateViewerMode() {
  const btn = document.getElementById("btnPublish");
  if (!isEditorMode) {
    // Add viewer banner
    const bar = document.querySelector(".progress-bar-wrap");
    if (!document.getElementById("viewerBanner")) {
      const b = document.createElement("div");
      b.id = "viewerBanner";
      b.className = "viewer-banner";
      b.textContent = "VIEW ONLY \u2014 Click Setup to enable editing";
      bar.after(b);
    }
    btn.style.display = "none";
    document.querySelectorAll(".task-row input[type=checkbox]").forEach(cb => cb.disabled = true);
    document.querySelectorAll(".notes-section textarea").forEach(ta => ta.disabled = true);
  } else {
    btn.style.display = "";
    const vb = document.getElementById("viewerBanner");
    if (vb) vb.remove();
  }
}

// Setup modal for GitHub token
function showSetup() {
  const existing = localStorage.getItem(TOKEN_KEY) || "";
  const masked = existing ? existing.slice(0,8) + "..." + existing.slice(-4) : "";
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = '<div class="modal">'+
    '<h2>GitHub Token Setup</h2>'+
    '<p>To publish progress, you need a GitHub Personal Access Token with <b>repo</b> scope.<br>'+
    '<a href="https://github.com/settings/tokens/new?scopes=repo&description=CCB+Tracker" target="_blank" style="color:#4EC9B0">Create token here</a> (select "repo" scope)</p>'+
    '<p style="font-size:10px;color:#666">Token is stored only in YOUR browser\'s localStorage. Never sent anywhere except GitHub API.</p>'+
    (masked ? '<p style="color:#4EC9B0;font-size:10px">Current: '+masked+'</p>' : '')+
    '<input id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx" value="">'+
    '<div class="btn-row">'+
    '<button class="btn-cancel" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>'+
    (existing ? '<button class="btn-cancel" onclick="clearToken(this)">Remove Token</button>' : '')+
    '<button class="btn-save" onclick="saveToken(this)">Save</button>'+
    '</div></div>';
  document.body.appendChild(overlay);
}

function saveToken(btn) {
  const input = document.getElementById("tokenInput");
  const token = input.value.trim();
  if (!token) { input.style.borderColor="#f44"; return; }
  localStorage.setItem(TOKEN_KEY, token);
  btn.closest(".modal-overlay").remove();
  isEditorMode = true;
  // Reload local state
  try { const ls = JSON.parse(localStorage.getItem(LOCAL_KEY)); if(ls && Object.keys(ls).length) state = ls; } catch(e){}
  buildUI();
  updateViewerMode();
  showToast("Token saved! You can now publish progress.");
}

function clearToken(btn) {
  localStorage.removeItem(TOKEN_KEY);
  btn.closest(".modal-overlay").remove();
  isEditorMode = false;
  updateViewerMode();
  showToast("Token removed. View-only mode.");
}

// Publish progress directly to GitHub via API
async function publishProgress() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) { showSetup(); return; }

  const btn = document.getElementById("btnPublish");
  btn.disabled = true;
  btn.textContent = "Publishing...";

  try {
    // 1) Get current file SHA (needed for update)
    const getResp = await fetch(
      "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + STATE_PATH,
      { headers: { "Authorization": "Bearer " + token, "Accept": "application/vnd.github.v3+json" } }
    );
    if (!getResp.ok && getResp.status !== 404) {
      throw new Error("GitHub API error: " + getResp.status + " " + (await getResp.text()));
    }
    let sha = null;
    if (getResp.ok) {
      const fileData = await getResp.json();
      sha = fileData.sha;
    }

    // 2) Build state payload
    const pub = Object.assign({}, state);
    pub._publishedAt = new Date().toISOString();
    pub._notes = notes;
    const json = JSON.stringify(pub, null, 2);
    const content = btoa(unescape(encodeURIComponent(json)));

    // 3) Push update via GitHub Contents API
    const body = {
      message: "Progress update " + new Date().toLocaleString(),
      content: content
    };
    if (sha) body.sha = sha;

    const putResp = await fetch(
      "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + STATE_PATH,
      {
        method: "PUT",
        headers: {
          "Authorization": "Bearer " + token,
          "Accept": "application/vnd.github.v3+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      }
    );

    if (!putResp.ok) {
      const err = await putResp.text();
      throw new Error("Push failed (" + putResp.status + "): " + err);
    }

    publishedDate = pub._publishedAt;
    document.getElementById("lastPublished").textContent =
      "Last published: " + new Date(publishedDate).toLocaleString();
    showToast("Published! Site updates in ~60 seconds.");

  } catch(e) {
    console.error("Publish error:", e);
    showToast("Error: " + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = "Publish Progress";
  }
}

function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => { t.className = "toast"; }, 5000);
}

function buildUI() {
  const lp = document.getElementById("leftPanel");
  let html = "";
  PHASES.forEach((phase,pi) => {
    const done = phase.tasks.filter(t=>state[t.id]).length;
    html += '<div class="phase">';
    html += '<div class="phase-header" onclick="togglePhase('+pi+')">';
    html += '<div class="phase-color-bar" style="background:'+phase.color+'"></div>';
    html += '<span class="phase-toggle" id="phase-toggle-'+pi+'">\u25BC</span>';
    html += '<span class="phase-title">'+escHtml(phase.name)+'</span>';
    html += '<span class="phase-count" id="phase-count-'+pi+'" style="color:'+(done===phase.tasks.length?"#4CAF50":phase.color)+'">  ['+done+'/'+phase.tasks.length+']</span>';
    html += '</div><div class="phase-tasks" id="phase-tasks-'+pi+'">';
    phase.tasks.forEach(task => {
      const chk = state[task.id]?"checked":"", dc = state[task.id]?" done":"";
      html += '<div class="task-row" id="row-'+task.id+'" onclick="selectTask(\''+task.id+'\')">';
      html += '<input type="checkbox" '+chk+' onclick="event.stopPropagation();onCheck(\''+task.id+'\',this)">';
      html += '<span class="task-id" style="color:'+phase.color+'">'+task.id+'</span>';
      html += '<span class="task-name'+dc+'" id="name-'+task.id+'">'+escHtml(task.name)+'</span>';
      html += '<span class="notes-indicator" id="note-ind-'+task.id+'" title="Has notes" style="display:'+(notes[task.id]?"":"none")+'">\u270E</span>';
      html += '<span class="task-badges">';
      task.sch.forEach(pg=>{html+='<span class="badge badge-sch">S'+pg+'</span>';});
      if(task.pcb) html+='<span class="badge badge-pcb">PCB</span>';
      html += '</span></div>';
    });
    html += '</div></div>';
  });
  lp.innerHTML = html;
  updateProgress();
}

// Boot
initState();
</script>
